<!doctype html>
<html>
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Students Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Students Management</h4>
    <div>
      <a class="btn btn-outline-primary" href="/add_student">Add Student</a>
      <a class="btn btn-outline-secondary" href="/">Back</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped">
      <thead class="table-dark">
        <tr><th>ID</th><th>Name</th><th>Roll</th><th>Class</th><th>Section</th><th>Reg No</th><th>Created</th><th>Actions</th></tr>
      </thead>
      <tbody id="studentsTable">
        <!-- Students will be loaded here -->
      </tbody>
    </table>
  </div>
</div>

<script>
async function loadStudents() {
    try {
        const response = await fetch('/students');
        const data = await response.json();
        const tbody = document.getElementById('studentsTable');

        if (data.students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center">No students found</td></tr>';
            return;
        }

        tbody.innerHTML = data.students.map(student => `
            <tr>
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.roll || '-'}</td>
                <td>${student.class || '-'}</td>
                <td>${student.section || '-'}</td>
                <td>${student.reg_no || '-'}</td>
                <td>${new Date(student.created_at).toLocaleDateString()}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteStudent(${student.id})">
                        Remove
                    </button>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error('Error loading students:', error);
        document.getElementById('studentsTable').innerHTML =
            '<tr><td colspan="8" class="text-center text-danger">Error loading students</td></tr>';
    }
}

async function deleteStudent(studentId) {
    if (!confirm('Are you sure you want to delete this student? This will also remove all their attendance records and training data.')) {
        return;
    }

    try {
        const response = await fetch(`/students/${studentId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            alert('Student deleted successfully');
            loadStudents(); // Reload the list
        } else {
            alert('Error deleting student');
        }
    } catch (error) {
        console.error('Error deleting student:', error);
        alert('Error deleting student');
    }
}

// Load students when page loads
document.addEventListener('DOMContentLoaded', loadStudents);
</script>
</body>
</html>
